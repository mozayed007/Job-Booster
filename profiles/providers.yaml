# Portable Provider Configuration
# Defines LLM providers and fallback chains in a platform-agnostic way.
# Any runtime adapter reads this to configure LLM access.
#
# Design: provider strings use LiteLLM format (provider:model) which is
# the closest thing to a universal standard. Runtimes translate to their
# own format.

schema_version: "1.0"

# ──────────────────────────────────────────────
# Provider definitions
# ──────────────────────────────────────────────
providers:
  openai:
    env_key: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    models:
      - id: gpt-4o
        capability: function-calling
        context_window: 128000
        cost_tier: high
      - id: gpt-4o-mini
        capability: function-calling
        context_window: 128000
        cost_tier: low
    default_model: gpt-4o

  anthropic:
    env_key: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com/v1
    models:
      - id: claude-sonnet-4-5
        capability: function-calling
        context_window: 200000
        cost_tier: medium
      - id: claude-haiku-3-5
        capability: function-calling
        context_window: 200000
        cost_tier: low
    default_model: claude-sonnet-4-5

  google:
    env_key: GEMINI_API_KEY
    alt_env_keys: [GOOGLE_API_KEY, GOOGLE_GEMINI_API_KEY]
    base_url: https://generativelanguage.googleapis.com/v1beta
    models:
      - id: google:gemini-3.1-flash-lite
        capability: function-calling
        context_window: 1000000
        cost_tier: low
      - id: gemini-2.5-pro
        capability: function-calling
        context_window: 1000000
        cost_tier: high
    default_model: google:gemini-3.1-flash-lite

  groq:
    env_key: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    models:
      - id: llama-3.3-70b-versatile
        capability: function-calling
        context_window: 128000
        cost_tier: low
    default_model: llama-3.3-70b-versatile

  together:
    env_key: TOGETHER_API_KEY
    base_url: https://api.together.xyz/v1
    models:
      - id: meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo
        capability: function-calling
        context_window: 128000
        cost_tier: low
    default_model: meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo

  openrouter:
    env_key: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    models:
      - id: anthropic/claude-sonnet-4-5
        capability: function-calling
        context_window: 200000
        cost_tier: medium
    default_model: anthropic/claude-sonnet-4-5

  ollama:
    env_key: null
    base_url: http://localhost:11434/v1
    local: true
    models:
      - id: llama3.1
        capability: text
        context_window: 128000
        cost_tier: free
      - id: qwen2.5
        capability: function-calling
        context_window: 128000
        cost_tier: free
    default_model: llama3.1
    health_check: http://localhost:11434/api/tags

  vllm:
    env_key: null
    base_url: http://localhost:8000/v1
    local: true
    models:
      - id: default
        capability: function-calling
        context_window: 128000
        cost_tier: free
    default_model: default
    health_check: http://localhost:8000/health

# ──────────────────────────────────────────────
# Fallback chains (ordered by preference)
# ──────────────────────────────────────────────
chains:
  cloud_first:
    description: "Try cloud providers first, fall back to local"
    strategy: sequential
    providers:
      - openai
      - anthropic
      - google
      - openrouter
      - groq
      - together
      - ollama
      - vllm

  local_first:
    description: "Try local models first, fall back to cloud"
    strategy: sequential
    providers:
      - ollama
      - vllm
      - openai
      - anthropic
      - google

  cost_optimized:
    description: "Prefer cheapest providers"
    strategy: sequential
    providers:
      - ollama
      - vllm
      - groq
      - together
      - google
      - openrouter
      - anthropic
      - openai

  quality_first:
    description: "Prefer highest quality models"
    strategy: sequential
    providers:
      - anthropic
      - openai
      - google
      - openrouter
      - groq
      - together
      - ollama
      - vllm

# ──────────────────────────────────────────────
# Default settings
# ──────────────────────────────────────────────
defaults:
  chain: cloud_first
  model_retries: 2
  timeout_seconds: 120
  max_tokens: 4096
