# Pipeline configuration registry — loaded by PipelineEngine
# Each pipeline defines an ordered sequence of agent steps.
# Paths are relative to this file's directory.

pipelines:
  full_application:
    name: "Full Job Application Pipeline"
    description: "End-to-end: CV extraction, resume review, cover letter, and job search"
    enabled: true
    steps:
      - agent: cv_extractor
        description: "Extract CV and tailor resume to job description"
      - agent: resume_reviewer
        description: "Review and polish resume bullets using XYZ formula"
      - agent: cover_letter_generator
        description: "Generate tailored cover letter"
      - agent: discovery_sync
        description: "Import BigSet exports before job search"
      - agent: job_finder
        description: "Find matching job opportunities"

  resume_only:
    name: "Resume Tailoring Only"
    description: "CV extraction and resume review without cover letter or job search"
    enabled: true
    steps:
      - agent: cv_extractor
        description: "Extract CV and tailor resume to job description"
      - agent: resume_reviewer
        description: "Review and polish resume bullets using XYZ formula"

  discovery_sync_only:
    name: "Discovery Sync Only"
    description: "Import BigSet folder exports and optional remote dataset planning"
    enabled: true
    steps:
      - agent: discovery_sync
        description: "Sync BigSet imports into startups and job tables"

  daily_scanner:
    name: "Daily Startup Scanner"
    description: "Scan company career pages for job openings matched to user preferences"
    enabled: true
    schedule: "0 9 * * *"
    steps:
      - agent: discovery_sync
        description: "Import BigSet exports and refresh discovery index"
      - agent: startup_scanner
        description: "Scan startup career pages and extract job openings"

  cover_letter_only:
    name: "Cover Letter Generation"
    description: "Generate a cover letter from existing resume and job description"
    enabled: true
    steps:
      - agent: cover_letter_generator
        description: "Generate tailored cover letter"

  job_search_only:
    name: "Job Search Only"
    description: "Find job opportunities matching a resume"
    enabled: true
    steps:
      - agent: discovery_sync
        description: "Import BigSet exports before job search"
      - agent: job_finder
        description: "Find matching job opportunities"

  outreach:
    name: "Post-Application Outreach"
    description: "Generate follow-up, thank-you, cold outreach, and referral messages"
    enabled: true
    steps:
      - agent: outreach_agent
        description: "Generate outreach messages based on resume and job description"

  interview_prep:
    name: "Interview Preparation"
    description: "Generate behavioral questions, technical topics, and STAR stories"
    enabled: true
    steps:
      - agent: interview_coach
        description: "Generate tailored interview coaching material"

  onboarding:
    name: "Onboarding Profile Setup"
    description: "Conversational interview that gathers hobbies, interests, and personal context for later gap-recommendation agents"
    enabled: true
    steps:
      - agent: onboarding_agent
        description: "Finalize personal context from onboarding conversation"

  gap_recommendation:
    name: "Enjoyable Gap Recommendations"
    description: "Recommend projects and courses covering technical skill gaps using the user's personal context"
    enabled: true
    steps:
      - agent: gap_recommendation_agent
        description: "Generate enjoyable recommendations for skill gaps"
